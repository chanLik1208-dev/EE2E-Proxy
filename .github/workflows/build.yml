name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 命令列版：純 Go，無 CGO，一台 runner 交叉編譯所有平台。
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: 交叉編譯 CLI（全平台）
        run: ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: dist/*

  # GUI 版：Fyne 需要 CGO 與系統圖形函式庫，在各平台原生 runner 上編譯。
  # macOS 用 Apple Silicon runner 同時產出 arm64 與 amd64（透過 clang 的 -arch 交叉編譯），
  # 避開稀缺的 Intel mac runner。
  gui:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: 安裝 Linux 圖形相依
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev
      - name: 編譯 GUI
        shell: bash
        env:
          CGO_ENABLED: '1'
        run: |
          mkdir -p out

          # Linux / Windows：直接產出原生執行檔。
          build() { # build <cmd> <out>
            go build -trimpath -ldflags "-s -w" -o "out/$2" "$1"
          }

          # macOS：合成 arm64+amd64 通用二進位，包成 ad-hoc 簽章的 .app 再壓成 zip。
          # ad-hoc 簽章可消除 Apple Silicon「已損毀」的問題；首次開啟仍需右鍵→打開一次。
          mkapp() { # mkapp <顯示名> <cmd> <bundle-id> <執行檔名>
            local name="$1" cmd="$2" bid="$3" bin="$4"
            GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o "/tmp/$bin-arm64" "$cmd"
            GOARCH=amd64 CGO_CFLAGS="-arch x86_64" CGO_LDFLAGS="-arch x86_64" \
              go build -trimpath -ldflags "-s -w" -o "/tmp/$bin-amd64" "$cmd"
            lipo -create -output "/tmp/$bin" "/tmp/$bin-arm64" "/tmp/$bin-amd64"

            local app="out/$name.app"
            mkdir -p "$app/Contents/MacOS"
            cp "/tmp/$bin" "$app/Contents/MacOS/$bin"
            cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>$name</string>
            <key>CFBundleDisplayName</key><string>$name</string>
            <key>CFBundleExecutable</key><string>$bin</string>
            <key>CFBundleIdentifier</key><string>$bid</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleVersion</key><string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME#v}</string>
            <key>LSMinimumSystemVersion</key><string>10.13</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
            codesign --force --deep --sign - "$app"
            ( cd out && zip -qry "$bin-darwin-universal.app.zip" "$name.app" && rm -rf "$name.app" )
          }

          case "${{ runner.os }}" in
            Linux)   build ./cmd/server-gui server-gui-linux-amd64;   build ./cmd/client-gui client-gui-linux-amd64 ;;
            Windows) build ./cmd/server-gui server-gui-windows-amd64.exe; build ./cmd/client-gui client-gui-windows-amd64.exe ;;
            macOS)
              mkapp "Tunnel Server" ./cmd/server-gui com.ee2e.tunnel.server server-gui
              mkapp "Tunnel Client" ./cmd/client-gui com.ee2e.tunnel.client client-gui
              ;;
          esac
      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ runner.os }}
          path: out/*

  # 推送 v* 標籤時，把所有產物附到 GitHub Release。
  release:
    needs: [cli, gui]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: 建立 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" artifacts/* --repo "${{ github.repository }}" --generate-notes
